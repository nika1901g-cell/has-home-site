backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: "ru"

collections:
  - name: "settings"
    label: "Настройки сайта"
    files:
      - name: "general"
        label: "Общие настройки"
        file: "_data/settings.json"
        format: json
        fields:
          - { label: "Заголовок", name: "site_title", widget: "string" }
          - { label: "Слоган", name: "tagline", widget: "string" }

  - name: "products"
    label: "Товары"
    folder: "_products"
    create: true
    slug: "{{slug}}"
    format: json
    extension: json
    fields:
      - { label: "Название", name: "title", widget: "string" }
      - { label: "Цена", name: "price", widget: "number" }
      - { label: "Категория", name: "category", widget: "string" }
      - { label: "Фото", name: "image", widget: "image", required: false }
